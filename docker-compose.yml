version: '3.8'

services:
  # Service 1: Khusus menjalankan dashboard Streamlit
  dashboard:
    build: .
    container_name: rupiah_monitor_dashboard
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./data:/app/data
    ports:
      - "8501:8501"
    restart: always

  # Service 2: Khusus menjalankan background scrapper (Ingestion)
  ingestion:
    build: .
    container_name: rupiah_monitor_ingestion
    command: python3 processor.py
    volumes:
      - ./data:/app/data
    restart: always

  # Service 3: Reverse Proxy Nginx
  nginx:
    image: nginx:latest
    container_name: rupiah_monitor_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
    restart: always

volumes:
  data: